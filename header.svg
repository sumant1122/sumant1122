<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <style>
      @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { opacity: 0.3; }
      }
      .pulse-obj { animation: pulse 4s infinite ease-in-out; }
      .pulse-delay { animation: pulse 4s infinite ease-in-out 2s; }
      .pulse-bar { animation: pulse 3s infinite ease-in-out; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="15"/>
  
  <path fill="#3fb950" opacity="0.1" d="M0,160 Q200,100 400,140 Q600,180 800,120 L800,200 L0,200 Z">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" values="M0,160 Q200,100 400,140 Q600,180 800,120 L800,200 L0,200 Z;M0,140 Q200,180 400,120 Q600,100 800,160 L800,200 L0,200 Z;M0,160 Q200,100 400,140 Q600,180 800,120 L800,200 L0,200 Z" />
  </path>
  <path fill="#238636" opacity="0.08" d="M0,175 Q200,130 400,160 Q600,190 800,150 L800,200 L0,200 Z">
    <animate attributeName="d" dur="12s" repeatCount="indefinite" values="M0,175 Q200,130 400,160 Q600,190 800,150 L800,200 L0,200 Z;M0,150 Q200,190 400,160 Q600,130 800,175 L800,200 L0,200 Z;M0,175 Q200,130 400,160 Q600,190 800,150 L800,200 L0,200 Z" />
  </path>

  <text x="400" y="95" font-family="Verdana, Geneva, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">SUMANT</text>
  <rect x="200" y="110" width="400" height="3" fill="url(#accent)" rx="1.5" class="pulse-bar" />
  <text x="400" y="145" font-family="Verdana, Geneva, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="3">DEVOPS · SRE · PLATFORM ENGINEER</text>
  
  <path d="M50,20 L50,80 M20,50 L80,50" stroke="#3fb950" stroke-width="1" class="pulse-obj" />
  <path d="M750,120 L750,180 M720,150 L780,150" stroke="#3fb950" stroke-width="1" class="pulse-delay" />
</svg>